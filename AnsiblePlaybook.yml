---
- hosts: all
  become: true

  vars_files:
    - vars.yml  

  ##################################################################
  #########################      TASKS      ########################
  ##################################################################
  tasks:
    - name: Install gnupg for deb8222 and veracrypt install verification
      ansible.builtin.apt:
        name: 
          - gnupg # Required for pgp keys
          - python3-debian # Required for ansible.builtin.deb822_repository to work correctly
          - git
        state: present
        update_cache: true
        autoclean: true

    ###############  Veracrypt  ###############
    - name: Veracrypt Install
      block:
      - name: Download VeraCrypt {{ veracrypt_version }} package
        get_url:
          url: "{{ veracrypt_url }}"
          dest: "/tmp/{{ veracrypt_deb }}"

      - name: Download VeraCrypt {{ veracrypt_version }} signature
        get_url:
          url: "{{ veracrypt_sig_url }}"
          dest: "/tmp/{{ veracrypt_sig }}"

      - name: Download VeraCrypt public PGP key
        get_url:
          url: "{{ veracrypt_pgp_public_key_url }}"
          dest: /tmp/VeraCrypt_PGP_public_key.asc

      - name: Read key fingerprint without importing
        command:
          cmd: >
            gpg --import --import-options show-only /tmp/VeraCrypt_PGP_public_key.asc
        register: gpg_key_info
        changed_when: false

      - name: Verify VeraCrypt public key fingerprint
        assert:
          that:
            - gpg_key_info.stdout_lines[1] | trim == veracrypt_public_key
          fail_msg: >-
            Fingerprint mismatch.
            Expected {{ veracrypt_public_key }}
            but found {{ veracrypt_public_key }}
          success_msg: VeraCrypt public key fingerprint verified.

      - name: Import VeraCrypt public key
        command:
          cmd: gpg --import /tmp/VeraCrypt_PGP_public_key.asc
        when: gpg_key_info.stdout_lines[1] | trim == veracrypt_public_key

      - name: Verify VeraCrypt PGP signature
        command:
          cmd: >
            gpg --verify
            /tmp/{{ veracrypt_sig }}
            /tmp/{{ veracrypt_deb }}
        register: gpg_verify
        changed_when: false
        
      - name: Verify VeraCrypt SHA256 checksum
        stat:
          path: "/tmp/{{ veracrypt_deb }}"
          checksum_algorithm: sha256
        register: veracrypt_stat
      
      - name: Validate Veracrypt download computed SHA256 value and veracypt expected SHA256 value
        fail:
          msg: "SHA256 mismatch {{ veracrypt_stat }}"
        # | lower required to make sure the hash checksums are equivalent and there isn't any funky case stuff happening here
        when: veracrypt_stat.stat.checksum | lower != veracrypt_sha256 | lower 

      - name: Installing VeraCrypt
        apt:
          deb: "/tmp/{{ veracrypt_deb }}"


    ###############  Veracrypt  ###############
    - name: Add yubikey PPA
      block:
      - name: Fetch Yubico PPA key
        ansible.builtin.get_url:
          url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xFA4EC8F2EE58CE0B"
          dest: /tmp/yubico.asc
      
      - name: Convert PPA key to keyring
        ansible.builtin.command:
          cmd: >
            gpg --dearmor
            --output /usr/share/keyrings/yubico-archive-keyring.gpg
            /tmp/yubico.asc
        args:
          creates: /usr/share/keyrings/yubico-archive-keyring.gpg
    
      - name: Add Yubico repository
        ansible.builtin.deb822_repository:
          name: yubico
          types: [deb]
          uris:
            - https://ppa.launchpadcontent.net/yubico/stable/ubuntu
          suites:
            - noble
          components:
            - main
          signed_by: /usr/share/keyrings/yubico-archive-keyring.gpg

      - name: Update and install yubikey-manager
        apt:
          name: yubikey-manager
          state: present
          update_cache: true
          autoclean: true